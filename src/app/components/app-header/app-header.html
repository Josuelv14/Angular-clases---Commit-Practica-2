<header class="app-header">

  <span class="title">  {{brand()| uppercase}}</span>

  <!----NAVBAR-------->
<nav class="app-header__nav">
  <!--
    [routerLinkActiveOptions]="{ exact: true }" → solo activo cuando la URL es exactamente "/".
    Sin esto, "/" estaría activo también en /students, /profile, etc.
  -->
  <a class="nav-link"
     routerLink="/"
     routerLinkActive="nav-link--active"
     [routerLinkActiveOptions]="{ exact: true }">
    Inicio
  </a>
  <a class="nav-link" 
   routerLink="/layouts" 
   routerLinkActive="nav-link--active">
   Layouts
</a>

  <!-- Estudiantes no necesita exact: "/students" no es prefijo de ninguna otra ruta. -->
  <a class="nav-link"
     routerLink="/students"
     routerLinkActive="nav-link--active">
    Estudiantes
  </a>
  <a class="nav-link" 
   routerLink="/signup" 
   routerLinkActive="nav-link--active">
   Sign-Up
</a>
  <a class="nav-link" 
     routerLink="/profile" 
     routerLinkActive="nav-link--active">
     Perfil
  </a>
  <a class="nav-link" 
     routerLink="/project-config" 
     routerLinkActive="nav-link--active">
     Proyecto
  </a>
</nav>

  </header>
