<section class="space-y-10 pt-24 px-lg">
    <header class="grid items-stretch gap-4 lg:grid-cols-[1.3fr_1fr]">
        <div class="rounded-3xl border border-primary/20 bg-surface-container p-8 shadow-sm">
            <p class="text-xs font-semibold uppercase tracking-[0.3em] text-primary">Design System</p>
            <h1 class="mt-2 text-3xl font-black tracking-tight text-on-surface md:text-4xl">Catálogo de Componentes</h1>
            <p class="mt-4 text-sm text-on-surface-variant leading-relaxed">
                Interfaz optimizada para validación de componentes visuales y consistencia de marca.
            </p>
        </div>

        <app-gradient-cta-banner
            title="Consistencia Visual"
            description="Componentes optimizados para alto rendimiento."
            actionLabel="Explorar Protocolos"
        />
    </header>

    <section class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
        <app-glass-stat-card label="Pantallas" value="12" helper="Layouts base" />
        <app-glass-stat-card label="Componentes" value="9" helper="UI Reutilizable" />
        <app-glass-stat-card label="Rutas" value="15" helper="Navegación activa" />
        <app-glass-stat-card label="Status" value="PRO" helper="Neural Secured" />
    </section>

    <section class="grid gap-6 lg:grid-cols-[2fr_1fr]">
        <article class="rounded-3xl border border-primary/10 bg-surface-container-low p-8">
            <h2 class="text-xl font-black text-on-surface uppercase tracking-tight">Arquitectura de Red</h2>
            <p class="mt-2 text-sm text-on-surface-variant">Pruebas de visualización en diferentes puntos de interrupción.</p>
            
            <div class="mt-6 grid gap-4 sm:grid-cols-2">
                <div class="rounded-2xl border border-primary/20 bg-primary/5 p-4">
                    <p class="text-sm font-bold text-primary uppercase">Segmento A</p>
                    <p class="text-xs opacity-70">Monitorización de interfaces.</p>
                </div>
                <div class="rounded-2xl border border-primary/20 bg-secondary/5 p-4">
                    <p class="text-sm font-bold text-secondary uppercase">Segmento B</p>
                    <p class="text-xs opacity-70">Despliegue de módulos.</p>
                </div>
            </div>
        </article>

        <app-feature-chip-list [chips]="quickChips" title="Stack Tecnológico" />
    </section>
</section>
