<section class="space-y-10">
  <header class="space-y-3">
    <h1 class="text-3xl font-bold tracking-tight text-slate-900 md:text-4xl uppercase">
      Signup Page
    </h1>
    <p class="max-w-2xl leading-7 text-slate-600">
      Crea tu cuenta para empezar.
    </p>
  </header>

  <form [formGroup]="form" class="max-w-md space-y-6 bg-white p-8 rounded-2xl shadow-md border border-slate-200"
    (Submit)="onSubmit()"
    class="max-w-md space-y-4"
>
    
    <div class="space-y-2">
      <label for="email" class="block text-sm font-semibold text-slate-700">
        Email
      </label>
      <input
        type="email"
        id="email"
        formControlName="email"
        class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-slate-900 placeholder-slate-400 focus:border-sky-500 focus:outline-none focus:ring-4 focus:ring-sky-500/10 transition-all"
        placeholder="tu@email.com"
      />
      
      @if (email.touched && email.invalid) {
        <div class="flex items-center gap-1 text-red-600">
           <span class="text-xs font-medium">
             @if (email.hasError('required')) { Email es requerido. }
             @else if (email.hasError('email')) { Formato de correo inválido. }
           </span>
        </div>
      }
    </div>

    <button type="submit" [disabled]="form.invalid"
            class="w-full rounded-lg bg-sky-600 py-3 font-bold text-white transition-all hover:bg-sky-700 disabled:opacity-50 disabled:cursor-not-allowed">
    </button>
    </form>
</section>
